{% extends 'layout.html' %}
{% load static %}

{%block title%}
   Register a New User 

{%endblock%}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/register.css' %}">
{% endblock %}

{% block content %}
<body>
    <h1>Register a New User</h1>
    <form class="form-with-validation" action="{% url 'users:register' %}" method="post">
      {% csrf_token %}
      {{ form }}
      <button class="form-submit">Submit</button>
    </form>
  </body>
{% endblock %}
