{% extends 'layout.html' %}
{% load static %}

{%block title%}
  New Listing

{%endblock%}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link rel="stylesheet" href="{% static 'css/post_new.css' %}">
{% endblock %}
{% block content %}
<body>
  <section class="form-section">
    <h1>New Listing</h1>
    <form class="form-with-validation" action="{% url 'posts:new-post' %}" method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="form-submit">Add Listing</button>
<!-- url is app name then what we had in urls-->
    </form>
  </section>
  <script src={% static 'js/post_new.js' %} ></script>
</body> 
{% endblock %}
